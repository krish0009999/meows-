<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f2027;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    color:white;
}

.chat-box {
    width:350px;
    height:500px;
    background:rgba(0,0,0,0.7);
    border-radius:20px;
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    position:relative;
    overflow:hidden;
}

.message {
    background:#fff;
    color:#000;
    padding:10px 15px;
    border-radius:15px;
    margin:5px 0;
    width:fit-content;
    max-width:80%;
    animation:fadeIn 0.4s ease;
}

.user { 
    background:#ff4e50; 
    color:white; 
    align-self:flex-end; 
}

button {
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#ff4e50;
    color:white;
    font-family:'Poppins',sans-serif;
    transition:0.2s ease;
    position:relative;
    z-index:10;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);} 
    to {opacity:1; transform:translateY(0);} 
}

.typing::after {
    content:'...';
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100%{opacity:0;}
    50%{opacity:1;}
}

.funny-bg {
    background: repeating-linear-gradient(45deg,#ff6ec4,#ff6ec4 10px,#7873f5 10px,#7873f5 20px);
    animation: moveBg 3s linear infinite;
}

@keyframes moveBg {
    from{background-position:0 0;} 
    to{background-position:200px 200px;}
}

.emoji {
    position:absolute;
    font-size:25px;
    animation:float 4s linear infinite;
    pointer-events:none;
}

@keyframes float {
    0%{transform:translateY(100vh);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>
<body>

<div class="chat-box" id="chat"></div>

<script>
let chat = document.getElementById('chat');

function msg(text, cls=''){
    let div = document.createElement('div');
    div.className = 'message ' + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function typing(cb){
    let div = document.createElement('div');
    div.className = 'message typing';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    setTimeout(() => {
        div.remove();
        cb();
    }, 1500);
}

function start(){
    typing(() => {
        msg('Are you my School Friend or College Friend?');
        btns(['School Friend','College Friend'], step2);
    });
}

function btns(arr, cb){
    arr.forEach(txt => {
        let b = document.createElement('button');
        b.innerText = txt;

        // Boy aur No button bhagenge 😈
        if(txt === 'Boy' || txt === 'No'){
            makeRunAway(b);
        } else {
            b.onclick = () => {
                clearBtns();
                msg(txt, 'user');
                cb(txt);
            };
        }

        chat.appendChild(b);
    });
}

function makeRunAway(btn){
    btn.style.position = 'relative';

    function run(){
        let x = Math.floor(Math.random() * 220) - 110;
        let y = Math.floor(Math.random() * 120) - 60;

        btn.style.transform = `translate(${x}px, ${y}px)`;
        btn.style.transition = '0.2s ease';
    }

    // Desktop hover
    btn.addEventListener('mouseenter', run);

    // Mobile touch
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        run();
    });

    // Click bhi na ho
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        run();
    });
}

function clearBtns(){
    document.querySelectorAll('button').forEach(b => b.remove());
}

function step2(){
    typing(() => {
        msg('Are you a Girl or Boy?');
        btns(['Boy','Girl'], step3);
    });
}

function step3(ans){
    if(ans === 'Boy'){
        typing(() => {
            msg('😒 Sorry Boys Not Allowed!');
            msg('GET LOST 😂');
        });
    } else {
        typing(() => {
            msg('Are you Sayantani Dey?');
            btns(['Yes','No'], step4);
        });
    }
}

function step4(ans){
    if(ans === 'No'){
        typing(() => msg('Oops wrong person 😅'));
    } else {
        romantic();
    }
}

function romantic(){
    typing(() => msg('Cutie... I wanna tell you something ❤️'));

    setTimeout(() => {
        typing(() => msg('From the first day... I felt something special 💖'));
    }, 2000);

    setTimeout(() => {
        typing(() => msg('I tried to hide it... but I can’t anymore 😳'));
    }, 4000);

    setTimeout(() => {
        typing(() => msg('I LOVE YOU ❤️'));
    }, 6000);

    setTimeout(aprilFool, 8500);
}

function aprilFool(){
    document.body.classList.add('funny-bg');
    chat.innerHTML = '';

    msg('😂 APRIL FOOL 😂');
    msg('GOT YOU 🤣🔥');

    for(let i = 0; i < 40; i++){
        let e = document.createElement('div');
        e.className = 'emoji';
        e.innerText = '😂';
        e.style.left = Math.random() * 100 + 'vw';
        e.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(e);
    }

    let audio = new Audio('https://www.myinstants.com/media/sounds/trollolol.mp3');
    audio.play();
}

start();
</script>

</body>
</html>
